# ============================================================================
# Starship Prompt Configuration — Catppuccin Mocha Edition
# ============================================================================
# A polished powerline prompt with Catppuccin Mocha color palette.
# Requires: Nerd Font patched font (e.g., JetBrainsMono Nerd Font)
#
# Install: cp starship.toml ~/.config/starship.toml
# Docs:    https://starship.rs/config/
# ============================================================================

"$schema" = 'https://starship.rs/config-schema.json'

# Gradient: Mauve → Blue → Sapphire → Teal → Sky → Surface0 → Base
format = """
[<](color_mauve)\
$os\
$username\
$sudo\
[>](bg:color_blue fg:color_mauve)\
$directory\
[>](bg:color_sapphire fg:color_blue)\
$git_branch\
$git_commit\
$git_status\
$git_metrics\
[>](bg:color_teal fg:color_sapphire)\
$aws\
$kubernetes\
$gcloud\
[>](bg:color_sky fg:color_teal)\
$nodejs\
$bun\
$deno\
$python\
$rust\
$golang\
$java\
$kotlin\
$swift\
$typescript\
$c\
$cpp\
$zig\
$ruby\
$lua\
$dart\
$haskell\
$elixir\
$terraform\
$helm\
[>](bg:color_surface0 fg:color_sky)\
$docker_context\
$conda\
$nix_shell\
[>](bg:color_surface1 fg:color_surface0)\
$memory_usage\
$battery\
$cmd_duration\
$jobs\
[>](fg:color_surface1)\
$line_break$character"""

# ============================================================================
# Catppuccin Mocha Palette
# ============================================================================

palette = 'catppuccin_mocha'

[palettes.catppuccin_mocha]
color_fg0     = '#cdd6f4'  # Text
color_bg0     = '#1e1e2e'  # Base
color_surface0= '#313244'  # Surface0
color_surface1= '#45475a'  # Surface1
color_blue    = '#89b4fa'  # Blue
color_sapphire= '#74c7ec'  # Sapphire
color_sky     = '#89dceb'  # Sky
color_teal    = '#94e2d5'  # Teal
color_green   = '#a6e3a1'  # Green
color_yellow  = '#f9e2af'  # Yellow
color_peach   = '#fab387'  # Peach
color_mauve   = '#cba6f7'  # Mauve (purple-pink)
color_red     = '#f38ba8'  # Red
color_maroon  = '#eba0ac'  # Maroon
color_pink    = '#f5c2e7'  # Pink
color_flamingo= '#f2cdcd'  # Flamingo
color_lavender= '#b4befe'  # Lavender

# ============================================================================
# OS Module
# ============================================================================

[os]
disabled = false
style = "bold bg:color_mauve"

[os.symbols]
Alpine       = "󰣕 "
Amazon       = "󰅧 "
Android      = "󰀲 "
Arch         = "󰣕 "
Artix        = "󰣕 "
CentOS       = "󰣕 "
Debian       = "󰣕 "
EndeavourOS  = "󰣕 "
Fedora       = "󰣕 "
Gentoo       = "󰣕 "
Linux        = "󰌽 "
Macos        = "󰀵 "
Manjaro      = "󰣕 "
Mint         = "󰣕 "
Pop          = "󰣕 "
Raspbian     = "󰣕 "
Redhat       = "󰣕 "
RedHatEnterprise = "󰣕 "
SUSE         = "󰣕 "
Ubuntu       = "󰕈 "
Windows      = "󰍲 "
Kali         = "󰈆 "

# ============================================================================
# Username Module
# ============================================================================

[username]
show_always = true
style_user = "bold bg:color_mauve"
style_root = "bold bg:color_mauve"
format = '[ $user ]($style)'

# ============================================================================
# Sudo Module
# ============================================================================

[sudo]
symbol = "󰌾 "
style = "bold bg:color_mauve"
format = '[ $symbol ]($style)'
disabled = false

# ============================================================================
# Directory Module
# ============================================================================

[directory]
style = "bold fg:color_fg0 bg:color_blue"
format = '[ $path ]($style)[$read_only]($style)'
truncation_length = 3
truncation_symbol = "…/"
read_only = "󰌾 "

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music"     = "󰝚 "
"Pictures"  = " "
"Developer" = "󰲋 "
"Projects"  = "󰲋 "

# ============================================================================
# Git Modules
# ============================================================================

[git_branch]
symbol = " "
style = "bold fg:color_fg0 bg:color_sapphire"
format = '[ $symbol $branch ]($style)'

[git_commit]
style = "bold fg:color_fg0 bg:color_sapphire"
format = '[󰜘 $hash ]($style)'

[git_status]
style = "bold fg:color_fg0 bg:color_sapphire"
format = '[$all_status$ahead_behind ]($style)'

[git_metrics]
disabled = false
format = '[+$added]($added_style)[-$deleted]($deleted_style)'
added_style   = "bold fg:color_green bg:color_sapphire"
deleted_style = "bold fg:color_red bg:color_sapphire"

# ============================================================================
# Cloud & Infrastructure Modules
# ============================================================================

[aws]
symbol = "󰸑 "
style = "bold fg:color_fg0 bg:color_teal"
format = '[ $symbol $profile ($region) ]($style)'

[kubernetes]
symbol = "󱃾 "
style = "bold fg:color_fg0 bg:color_teal"
format = '[ $symbol $context\($namespace\) ]($style)'

[gcloud]
symbol = "󰈺 "
style = "bold fg:color_fg0 bg:color_teal"
format = '[ $symbol $project ($region) ]($style)'

[terraform]
symbol = "󱁢 "
style = "bold fg:color_fg0 bg:color_teal"
format = '[ $symbol ($version) ]($style)'

[helm]
symbol = "󱃾 "
style = "bold fg:color_fg0 bg:color_teal"
format = '[ $symbol ($version) ]($style)'

# ============================================================================
# Language Modules
# ============================================================================

[nodejs]
symbol = " "
style = "bold fg:color_fg0 bg:color_sky"
format = '[ $symbol ($version) ]($style)'

[bun]
symbol = "󰏗 "
style = "bold fg:color_fg0 bg:color_sky"
format = '[ $symbol ($version) ]($style)'

[deno]
symbol = "󰲔 "
style = "bold fg:color_fg0 bg:color_sky"
format = '[ $symbol ($version) ]($style)'

[python]
symbol = "󰌠 "
style = "bold fg:color_fg0 bg:color_sky"
format = '[ $symbol ($version) ]($style)'

[rust]
symbol = "󱘗 "
style = "bold fg:color_fg0 bg:color_sky"
format = '[ $symbol ($version) ]($style)'

[golang]
symbol = "󰟓 "
style = "bold fg:color_fg0 bg:color_sky"
format = '[ $symbol ($version) ]($style)'

[java]
symbol = "󰅱 "
style = "bold fg:color_fg0 bg:color_sky"
format = '[ $symbol ($version) ]($style)'

[kotlin]
symbol = "󱲀 "
style = "bold fg:color_fg0 bg:color_sky"
format = '[ $symbol ($version) ]($style)'

[swift]
symbol = "󰛩 "
style = "bold fg:color_fg0 bg:color_sky"
format = '[ $symbol ($version) ]($style)'

[typescript]
symbol = "󰌦 "
style = "bold fg:color_fg0 bg:color_sky"
format = '[ $symbol ($version) ]($style)'

[c]
symbol = "󰙱 "
style = "bold fg:color_fg0 bg:color_sky"
format = '[ $symbol ($version) ]($style)'

[cpp]
symbol = "󰙱 "
style = "bold fg:color_fg0 bg:color_sky"
format = '[ $symbol ($version) ]($style)'

[zig]
symbol = "󰈙 "
style = "bold fg:color_fg0 bg:color_sky"
format = '[ $symbol ($version) ]($style)'

[ruby]
symbol = "󰂔 "
style = "bold fg:color_fg0 bg:color_sky"
format = '[ $symbol ($version) ]($style)'

[lua]
symbol = "󰢱 "
style = "bold fg:color_fg0 bg:color_sky"
format = '[ $symbol ($version) ]($style)'

[dart]
symbol = "󰻭 "
style = "bold fg:color_fg0 bg:color_sky"
format = '[ $symbol ($version) ]($style)'

[haskell]
symbol = "󰈙 "
style = "bold fg:color_fg0 bg:color_sky"
format = '[ $symbol ($version) ]($style)'

[elixir]
symbol = "󰦥 "
style = "bold fg:color_fg0 bg:color_sky"
format = '[ $symbol ($version) ]($style)'

# ============================================================================
# Container / Environment Modules
# ============================================================================

[docker_context]
symbol = "󰡨 "
style = "fg:color_flamingo bg:color_surface0"
format = '[ $symbol $context ]($style)'

[conda]
symbol = "󱓞 "
style = "fg:color_flamingo bg:color_surface0"
format = '[ $symbol $environment ]($style)'

[nix_shell]
symbol = "󱄅 "
style = "fg:color_flamingo bg:color_surface0"
format = '[ $symbol $state (\($name\)) ]($style)'

# ============================================================================
# Utility Modules
# ============================================================================

[memory_usage]
symbol = "󰍛 "
disabled = false
threshold = 75
style = "bold fg:color_red bg:color_surface1"
format = '[ $symbol ${ram} ]($style)'

[battery]
disabled = false
full_symbol    = "󱈏 "
charging_symbol= "󰂄 "
discharging_symbol = "💀 "
unknown_symbol = "󰂑 "
empty_symbol   = "󰂎 "
style = "bold bg:color_surface1"
format = '[ $symbol $percentage ]($style)'
display = [
  { threshold = 10, style = "bold fg:color_red bg:color_surface1" },
  { threshold = 30, style = "bold fg:color_yellow bg:color_surface1" },
  { threshold = 100, style = "bold fg:color_green bg:color_surface1" },  # threshold=100 forces display
]

[cmd_duration]
min_time = 2_000
style = "bold fg:color_yellow bg:color_surface1"
format = '[  $duration ]($style)'

[jobs]
symbol = "󰜱 "
style = "bold fg:color_lavender bg:color_surface1"
format = '[ $symbol $number ]($style)'

# ============================================================================
# Time Module
# ============================================================================

[time]
disabled = false
time_format = "%I:%M %p"
style = "bold fg:color_fg0 bg:color_surface0"
format = '[ 󰥔 $time ]($style)'

# ============================================================================
# Prompt Characters
# ============================================================================

[line_break]
disabled = false

[character]
success_symbol = '[❯](bold fg:color_green)'
error_symbol = '[❯](bold fg:color_red)'
vimcmd_symbol = '[❮](bold fg:color_green)'
vimcmd_replace_one_symbol = '[❮](bold fg:color_yellow)'
vimcmd_replace_symbol = '[❮](bold fg:color_yellow)'
vimcmd_visual_symbol = '[❮](bold fg:color_mauve)'
