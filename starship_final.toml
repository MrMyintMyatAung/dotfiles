"$schema" = 'https://starship.rs/config-schema.json'

# Gradient: Cyan -> Blue -> Aqua -> Purple -> Blue -> Cool Grey (bg3) -> Dark Grey (bg1)
format = """
[î‚²](color_cyan)\
$os\
$username\
$sudo\
[î‚°](bg:color_blue fg:color_cyan)\
$directory\
[î‚°](fg:color_blue bg:color_aqua)\
$git_branch\
$git_commit\
$git_status\
$git_metrics\
[î‚°](fg:color_aqua bg:color_purple)\
$aws\
$kubernetes\
[î‚°](fg:color_purple bg:color_blue)\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
$ruby\
$lua\
$zig\
[î‚°](fg:color_blue bg:color_bg3)\
$docker_context\
$conda\
$memory_usage\
$cmd_duration\
[î‚°](fg:color_bg3 bg:color_bg1)\
$time\
[î‚° ](fg:color_bg1)\
$line_break$character"""

palette = 'gruvbox_dark'

[palettes.gruvbox_dark]
color_fg0 = '#fbf1c7'
# NEW: Deep Dark Nordic Grey (for Time)
color_bg1 = '#2e3440' 
# NEW: Lighter Cool Blue-Grey (for Docker/Conda)
color_bg3 = '#4c566a' 
color_blue = '#458588'
color_aqua = '#689d6a'
color_green = '#98971a'
color_orange = '#d65d0e'
color_purple = '#b16286'
color_red = '#cc241d'
color_yellow = '#d79921'
color_cyan = '#8ec07c'

# ------------------------------------------------------------------------------
# SYSTEM & IDENTITY
# ------------------------------------------------------------------------------

[os]
disabled = false
style = "bg:color_cyan fg:color_fg0"

[os.symbols]
